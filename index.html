<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#303B59">

  <title>Frontend Mentor | Results summary component</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">

  <link rel="stylesheet" href="./styles/main.css">
  <script type="module" src="./scripts/main.js"></script>
</head>

<body>

  <main>
    <h1 class="visually-hidden">Result summary component</h1>

    <div class="results-card">
      <div class="score">
        <span class="score-label">Your Result</span>
        <div class="score-display">
          <span class="score-value">76</span>
          <span class="score-range">of 100</span>
        </div>
        <p class="score-status">Great</p>
        <p class="score-description">You scored higher than 65% of the people who have taken these tests.</p>
      </div>

      <section class="summary">
        <h2 class="summary-title">Summary</h2>

        <ul class="summary-list" id="summaryList"></ul>
        <button type="button" class="summary-button">
          <span>Continue</span>
        </button>
      </section>
    </div>
  </main>

  <footer class="attribution">
    <small>
      Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank" rel="noopener noreferrer"
        class="attribution-link">Frontend
        Mentor</a> | Coded by <a href="https://www.frontendmentor.io/profile/vimpdev" target="_blank"
        rel="noopener noreferrer" class="attribution-link">VIMP</a>
    </small>
  </footer>
</body>

</html>
